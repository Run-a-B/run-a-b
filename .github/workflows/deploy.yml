name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 권한 부여
        run: chmod +x ./gradlew
        working-directory: ./api

      - name: Gradle 빌드 (bootJar)
        run: ./gradlew bootJar -x test
        working-directory: ./api

      - name: 빌드된 jar 파일명 확인
        run: ls -la ./api/build/libs/

      - name: sshpass 설치
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: EC2로 jar 업로드
        run: |
          sshpass -p "${{ secrets.EC2_PASSWORD }}" scp -o StrictHostKeyChecking=no \
            ./api/build/libs/api-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/run-a-b/api/build/libs/api-0.0.1-SNAPSHOT.jar

      - name: EC2에서 서비스 재시작
        run: |
          sshpass -p "${{ secrets.EC2_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl restart runab-api && sleep 5 && sudo systemctl status runab-api --no-pager"
